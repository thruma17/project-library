<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header"><h1>Library</h1></header>
    <main class="main">
      <dialog class="modal" id="modal">
        <form class="new-book" method="dialog">
          <h2 class="title">Add new book</h2>
          <button type="button" class="close-modal-btn">x</button>
          <div class="form-inputs">
            <div class="form-input">
              <label for="booktitle">What's the title?</label
              ><input type="text" name="booktitle" id="booktitle" required />
            </div>
            <div class="form-input">
              <label for="bookauthor">Who's the author</label
              ><input type="text" name="bookauthor" id="bookauthor" required />
            </div>
            <div class="form-input">
              <label for="bookpages">How many pages?</label
              ><input type="number" name="bookpages" id="bookpages" required />
            </div>
            <div class="label-read">
              <label for="bookread">Did you finish reading it?</label>
              <input type="checkbox" name="bookread" id="bookread" />
            </div>
          </div>
          <button type="submit" class="btn submit-btn">Add</button>
        </form>
      </dialog>
      <button type="button" class="btn open-modal-btn" id="addBookBtn">
        + Add Book
      </button>
      <div class="books-list" id="booksList"></div>
    </main>
    <footer class="footer">
      <p>
        © 2026 -
        <script>
          document.write(new Date().getFullYear());
        </script>
        thruma17
      </p>
      <p>
        <a
          href="https://github.com/thruma17/project-library"
          target="_blank"
          rel="noopener"
        >
          <img
            class="github-logo"
            src="github-mark/github-mark.svg"
            alt="github-logo"
          />
        </a>
      </p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
